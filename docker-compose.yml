services:
  db:
    image: postgres:16-alpine
    container_name: catalogo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - banco-dados:/var/lib/postgresql/data
    networks:
      - catalogofilmes
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catalogo-backend
    restart: always
    command: sh -c "node src/config/migrate.js && node src/server.js"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    networks:
      - catalogofilmes
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: catalogo-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - catalogofilmes
    ports:
      - "80:80"

volumes:
  banco-dados:

networks:
  catalogofilmes:
